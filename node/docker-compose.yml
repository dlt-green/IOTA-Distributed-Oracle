version: '3.8'

services:
  oracle-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-node-1
    restart: unless-stopped
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 120s

    env_file:
      - .env

    environment:
      NODE_ID: "1"
      NODE_OPTIONS: --dns-result-order=ipv4first
      NODE_1_PRIVATEKEY_FILE: /run/secrets/node_privatekey

    secrets:
      - node_privatekey

    dns:
      - 1.1.1.1
      - 8.8.8.8

    ports:
      - "127.0.0.1:9080:9080"

    command: ["node", "--import", "tsx", "src/index.ts", "--node", "1"]

secrets:
  node_privatekey:
    file: ./privatekey.txt
